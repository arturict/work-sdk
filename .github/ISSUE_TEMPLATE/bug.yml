name: Bug report
description: Report reproducible incorrect behavior
title: "[bug] "
labels: [bug]
body:
  - type: dropdown
    id: adapter
    attributes:
      label: Adapter
      options: [core, github, linear, jira, testing, website]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Work SDK version
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Remove credentials and sensitive provider data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
